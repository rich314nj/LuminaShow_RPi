<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; background: #000;
  overflow: hidden; font-family: sans-serif;
}
#player { width: 100%; height: 100%; position: relative; }
#mediaContainer {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#videoEl {
  width: 100%; height: 100%;
  object-fit: contain; display: none;
}
#imageEl {
  width: 100%; height: 100%;
  object-fit: contain; display: none;
}
#iframeEl {
  width: 100%; height: 100%;
  border: none; display: none;
}
#pdfCanvas {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: none;
  background: white;
}
#pdfPageBadge {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
  padding: 4px 12px; border-radius: 99px; font-size: 11px;
  font-family: monospace; opacity: 0; transition: opacity 0.3s;
  z-index: 100; pointer-events: none;
}
#player:hover #pdfPageBadge { opacity: 1; }
#emptyState {
  color: #333; text-align: center;
}
#emptyState h2 { font-size: 24px; margin-bottom: 8px; }
#emptyState p { font-size: 14px; }

/* HUD */
#hud {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0; transition: opacity 0.3s;
  z-index: 100;
}
#player:hover #hud { opacity: 1; }
#currentName { color: white; font-size: 14px; font-weight: 600; }
#currentMeta { color: rgba(255,255,255,0.5); font-size: 11px; font-family: monospace; }
#progressBar {
  position: fixed; bottom: 0; left: 0; height: 3px;
  background: #e8721c; transition: width 0.5s linear;
  z-index: 200;
}
#controls { display: flex; gap: 8px; }
.ctrl-btn {
  background: rgba(255,255,255,0.15); border: none; color: white;
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 16px; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.3); }
#itemCounter {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.6);
  padding: 4px 10px; border-radius: 99px; font-size: 11px;
  font-family: monospace; opacity: 0; transition: opacity 0.3s;
  z-index: 100;
}
#player:hover #itemCounter { opacity: 1; }
#logo-watermark {
  position: fixed; top: 16px; left: 16px;
  font-size: 13px; font-family: monospace;
  color: rgba(255,255,255,0.2); letter-spacing: 2px;
  z-index: 100;
}

/* Transition overlay */
#fadeOverlay {
  position: fixed; inset: 0; background: black;
  pointer-events: none; opacity: 0; transition: opacity 0.5s;
  z-index: 50;
}
#fadeOverlay.fade-in { opacity: 1; }
</style>
</head>
<body>
<div id="player">
  <div id="fadeOverlay"></div>
  <div id="mediaContainer">
    <video id="videoEl" autoplay muted></video>
    <img id="imageEl" alt="">
    <iframe id="iframeEl" allowfullscreen allow="autoplay; fullscreen"></iframe>
    <canvas id="pdfCanvas"></canvas>
    <div id="pdfPageBadge">Page 1 / 1</div>
    <div id="emptyState">
      <div style="font-size:60px;margin-bottom:16px;opacity:0.2">◈</div>
      <h2 style="color:#444">No content scheduled</h2>
      <p style="color:#333">Add assets and create a playlist to get started</p>
    </div>
  </div>
  <div id="progressBar"></div>
  <div id="logo-watermark">LuminaShow</div>
  <div id="itemCounter">1 / 1</div>
  <div id="hud">
    <div>
      <div id="currentName">—</div>
      <div id="currentMeta">—</div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="prevItem()" title="Previous">◄</button>
      <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()" title="Pause">⏸</button>
      <button class="ctrl-btn" onclick="nextItem()" title="Next">►</button>
      <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    </div>
  </div>
</div>

<script>
// State
let playlist = null;
let items = [];
let currentIdx = 0;
let timer = null;
let paused = false;
let progressInterval = null;
let progressStart = null;   // timestamp of last resume
let remainingMs = 0;        // ms left when last paused

// FIX #2: track whether the duration-based timer has already fired,
// so videoEl.onended doesn't trigger a second advance.
let advanceLocked = false;

// PDF state
let pdfDoc = null;
let pdfCurrentPage = 0;
let pdfTotalPages = 0;
let pdfPageTimer = null;
let pdfMsPerPage = 0;
let pdfPageStart = null;       // timestamp when current page timer started
let pdfPageRemainingMs = null; // ms left on page tick when paused

// Elements
const videoEl = document.getElementById('videoEl');
const imageEl = document.getElementById('imageEl');
const iframeEl = document.getElementById('iframeEl');
const pdfCanvas = document.getElementById('pdfCanvas');
const pdfPageBadge = document.getElementById('pdfPageBadge');
const emptyEl = document.getElementById('emptyState');
const nameEl = document.getElementById('currentName');
const metaEl = document.getElementById('currentMeta');
const counterEl = document.getElementById('itemCounter');
const progressBar = document.getElementById('progressBar');
const pauseBtn = document.getElementById('pauseBtn');
const fadeOverlay = document.getElementById('fadeOverlay');

function extractYouTubeId(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '').toLowerCase();
    const path = u.pathname || '';

    // youtu.be/<id>
    if (host === 'youtu.be') {
      const id = path.split('/').filter(Boolean)[0] || '';
      return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
    }

    // youtube.com/watch?...&v=<id>
    if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com') {
      const v = u.searchParams.get('v');
      if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;

      // youtube.com/embed/<id>, /shorts/<id>, /live/<id>, /v/<id>
      const parts = path.split('/').filter(Boolean);
      if (parts.length >= 2 && ['embed', 'shorts', 'live', 'v'].includes(parts[0])) {
        const id = parts[1];
        return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
      }
    }
  } catch (_) {
    // Fall through to regex-based parsing below.
  }

  // Non-URL / malformed fallback parsing.
  const m = String(url).match(
    /(?:youtube\.com\/(?:watch\?.*?[?&]v=|embed\/|shorts\/|live\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
  );
  return m ? m[1] : null;
}

function extractVimeoId(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '').toLowerCase();
    const pathParts = (u.pathname || '').split('/').filter(Boolean);
    if (host.endsWith('vimeo.com')) {
      // Supports:
      // vimeo.com/<id>
      // player.vimeo.com/video/<id>
      // vimeo.com/channels/<name>/<id>, /groups/<name>/videos/<id>, etc.
      for (const part of pathParts) {
        if (/^\d+$/.test(part)) return part;
      }
    }
  } catch (_) {
    // Fall through to regex-based parsing below.
  }

  const m = String(url).match(/vimeo\.com\/(?:.*\/)?(\d+)/i);
  return m ? m[1] : null;
}

async function loadPlaylist() {
  const urlParams = new URLSearchParams(window.location.search);
  const playlistId = urlParams.get('playlist');
  const url = playlistId ? `/api/playlists/${playlistId}` : '/api/current-playlist';
  try {
    const res = await fetch(url);
    playlist = await res.json();
    if (playlist && playlist.items && playlist.items.length > 0) {
      items = playlist.items.filter(i => i.asset);
      currentIdx = 0;
      showItem(currentIdx);
    } else {
      showEmpty();
    }
  } catch (e) {
    showEmpty();
  }
}

function showEmpty() {
  hideAll();
  emptyEl.style.display = 'block';
}

function hideAll() {
  videoEl.style.display = 'none';
  imageEl.style.display = 'none';
  iframeEl.style.display = 'none';
  pdfCanvas.style.display = 'none';
  pdfPageBadge.style.display = 'none';
  emptyEl.style.display = 'none';
  videoEl.onended = null;
  videoEl.src = '';
  iframeEl.src = '';
  if (pdfPageTimer) { clearTimeout(pdfPageTimer); pdfPageTimer = null; }
  pdfDoc = null;
}

function safeAdvance() {
  // FIX #2: guard so only the first caller (timer or onended) wins
  if (advanceLocked) return;
  advanceLocked = true;
  advance();
}

function showItem(idx) {
  if (!items.length) { showEmpty(); return; }
  const item = items[idx];
  const asset = item.asset;
  const duration = (item.duration_override || asset.duration) * 1000;
  advanceLocked = false;

  // Always resume when switching items, regardless of prior pause state
  paused = false;
  pauseBtn.textContent = '⏸';

  clearTimers();
  fadeOut(async () => {
    hideAll();
    nameEl.textContent = asset.name;
    counterEl.textContent = `${idx + 1} / ${items.length}`;

    switch (asset.asset_type) {
      case 'image':
        imageEl.src = asset.uri;
        imageEl.style.display = 'block';
        metaEl.textContent = `Image · ${duration / 1000}s`;
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
        break;

      case 'video':
        videoEl.src = asset.uri;
        videoEl.style.display = 'block';
        videoEl.muted = false;
        metaEl.textContent = `Video · ${duration / 1000}s`;
        videoEl.play().catch(() => { videoEl.muted = true; videoEl.play(); });
        // FIX #2: onended uses safeAdvance — the duration timer below also
        // uses safeAdvance. Only the first one to fire will actually advance.
        videoEl.onended = () => safeAdvance();
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
        break;

      case 'youtube': {
        const vid = extractYouTubeId(asset.uri);
        if (!vid) {
          metaEl.textContent = 'YouTube · Invalid URL';
          // Avoid loading a broken YouTube iframe with empty/invalid video id.
          timer = setTimeout(() => safeAdvance(), 1000);
          break;
        }
        iframeEl.src = `https://www.youtube.com/embed/${vid}?autoplay=1&mute=0&controls=1&rel=0`;
        iframeEl.style.display = 'block';
        metaEl.textContent = `YouTube · ${duration / 1000}s`;
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
        break;
      }

      case 'pdf':
        pdfCanvas.style.display = 'block';
        pdfPageBadge.style.display = 'block';
        metaEl.textContent = `PDF · ${duration / 1000}s`;
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
        loadPdf(asset.uri, duration);
        break;

      case 'vimeo': {
        const vid = extractVimeoId(asset.uri);
        if (!vid) {
          metaEl.textContent = 'Vimeo · Invalid URL';
          timer = setTimeout(() => safeAdvance(), 1000);
          break;
        }
        iframeEl.src = `https://player.vimeo.com/video/${vid}?autoplay=1&title=0&byline=0`;
        iframeEl.style.display = 'block';
        metaEl.textContent = `Vimeo · ${duration / 1000}s`;
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
        break;
      }

      default:
        iframeEl.src = asset.uri;
        iframeEl.style.display = 'block';
        metaEl.textContent = `Web · ${duration / 1000}s`;
        startProgress(duration);
        timer = setTimeout(() => safeAdvance(), duration);
    }

    fadeIn();
  });
}

function advance() {
  if (!items.length) return;
  currentIdx = (currentIdx + 1) % items.length;
  if (currentIdx === 0 && playlist && !playlist.loop) {
    showEmpty(); return;
  }
  showItem(currentIdx);
}

// ── PDF page-by-page renderer ──────────────────────────────────────────────────
async function loadPdf(uri, totalDurationMs) {
  // Configure PDF.js worker (uses CDN-hosted worker to avoid CORS issues)
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try {
    pdfDoc = await pdfjsLib.getDocument(uri).promise;
    pdfTotalPages = pdfDoc.numPages;
    pdfCurrentPage = 1;
    // Divide total asset duration evenly across all pages (min 2s per page)
    pdfMsPerPage = Math.max(2000, Math.floor(totalDurationMs / pdfTotalPages));
    await renderPdfPage(pdfCurrentPage);
  } catch (e) {
    console.error('PDF load error:', e);
    safeAdvance();
  }
}

async function renderPdfPage(pageNum) {
  if (!pdfDoc || pdfCanvas.style.display === 'none') return;
  try {
    const page = await pdfDoc.getPage(pageNum);
    // Scale to fill the screen at device pixel ratio
    const dpr = window.devicePixelRatio || 1;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const viewport = page.getViewport({ scale: 1 });
    const scale = Math.min(vw / viewport.width, vh / viewport.height) * dpr;
    const scaledViewport = page.getViewport({ scale });

    pdfCanvas.width  = scaledViewport.width;
    pdfCanvas.height = scaledViewport.height;
    pdfCanvas.style.width  = (scaledViewport.width  / dpr) + 'px';
    pdfCanvas.style.height = (scaledViewport.height / dpr) + 'px';

    await page.render({
      canvasContext: pdfCanvas.getContext('2d'),
      viewport: scaledViewport
    }).promise;

    // Update page badge
    pdfPageBadge.textContent = `Page ${pageNum} / ${pdfTotalPages}`;

    // Schedule next page if there are more; otherwise let the outer timer handle advance
    if (pageNum < pdfTotalPages) {
      pdfPageStart = Date.now();
      pdfPageRemainingMs = null; // reset snapshot — fresh tick
      pdfPageTimer = setTimeout(async () => {
        pdfCurrentPage++;
        await renderPdfPage(pdfCurrentPage);
      }, pdfMsPerPage);
    }
    // When we reach the last page we simply stay on it until safeAdvance() fires
  } catch (e) {
    console.error('PDF render error:', e);
  }
}

function prevItem() {
  currentIdx = (currentIdx - 1 + items.length) % items.length;
  showItem(currentIdx);
}

function nextItem() {
  currentIdx = (currentIdx + 1) % items.length;
  showItem(currentIdx);
}

function clearTimers() {
  if (timer) clearTimeout(timer);
  if (progressInterval) clearInterval(progressInterval);
  if (pdfPageTimer) { clearTimeout(pdfPageTimer); pdfPageTimer = null; }
  // Silence video immediately — hideAll() runs 500ms later inside fadeOut,
  // so without this the previous video's audio plays through the black overlay.
  videoEl.pause();
  videoEl.muted = true;
  progressBar.style.width = '0%';
}

function startProgress(duration) {
  // FIX #7: always track remainingMs from full duration on a fresh item
  remainingMs = duration;
  progressStart = Date.now();
  progressInterval = setInterval(() => {
    if (paused) return;
    const elapsed = Date.now() - progressStart;
    const consumed = duration - remainingMs + elapsed;
    const pct = Math.min((consumed / duration) * 100, 100);
    progressBar.style.width = pct + '%';
  }, 100);
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
  if (paused) {
    clearTimeout(timer);
    videoEl.pause();
    // FIX #7: snapshot how much time is left at the moment of pause
    remainingMs = Math.max(0, remainingMs - (Date.now() - progressStart));
    // Pause PDF page advancement and snapshot remaining page time
    if (pdfPageTimer) {
      clearTimeout(pdfPageTimer);
      pdfPageTimer = null;
      // Store how much time was left on the current page tick
      pdfPageRemainingMs = Math.max(0, pdfMsPerPage - (Date.now() - pdfPageStart));
    }
  } else {
    // FIX #7: resume from the correct remaining time
    progressStart = Date.now();
    videoEl.play().catch(() => {});
    timer = setTimeout(() => safeAdvance(), remainingMs);
    // Resume PDF page advancement from where it was paused
    if (pdfDoc && pdfCurrentPage < pdfTotalPages) {
      pdfPageStart = Date.now();
      pdfPageTimer = setTimeout(async () => {
        pdfCurrentPage++;
        await renderPdfPage(pdfCurrentPage);
      }, pdfPageRemainingMs != null ? pdfPageRemainingMs : pdfMsPerPage);
    }
  }
}

function fadeOut(cb) {
  fadeOverlay.classList.add('fade-in');
  setTimeout(cb, 500);
}

function fadeIn() {
  setTimeout(() => fadeOverlay.classList.remove('fade-in'), 100);
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextItem();
  if (e.key === 'ArrowLeft') prevItem();
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

// Auto-reload playlist every 5 min to pick up schedule changes
setInterval(loadPlaylist, 5 * 60 * 1000);

loadPlaylist();
</script>
</body>
</html>
