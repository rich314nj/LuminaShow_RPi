<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Signage — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f; --surface: #111318; --border: #1e2530;
  --accent: #e8721c; --accent2: #f59542;
  --text: #e8ecf0; --text2: #8899aa; --text3: #4a5566;
  --red: #e84040;
}
html[data-theme="light"] {
  --bg: #f0f2f5; --surface: #ffffff; --border: #dde1e8;
  --accent: #d4621a; --accent2: #e8751c;
  --text: #0a0c0f; --text2: #4a5566; --text3: #8899aa;
  --red: #c93333;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

body {
  display: flex; align-items: center; justify-content: center;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(232,114,28,0.08) 0%, transparent 70%),
    linear-gradient(180deg, transparent 60%, rgba(232,114,28,0.02) 100%);
}

.login-wrap {
  width: 100%; max-width: 400px; padding: 24px;
}

.brand { text-align: center; margin-bottom: 40px; }
.brand-icon {
  width: 56px; height: 56px; margin: 0 auto 12px;
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.brand-name {
  font-size: 28px; font-weight: 800; letter-spacing: -1px;
}
.brand-name span { color: var(--accent); }
.brand-tagline { font-size: 13px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 4px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(232,114,28,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.card-title { font-size: 20px; font-weight: 800; margin-bottom: 28px; }

.form-group { margin-bottom: 18px; }
label {
  display: block; font-family: 'Space Mono', monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2);
  margin-bottom: 8px;
}
input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); color: var(--text);
  padding: 11px 14px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: 14px;
  transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(232,114,28,0.12); }
input::placeholder { color: var(--text3); }

.error-msg {
  background: rgba(232,64,64,0.1); border: 1px solid rgba(232,64,64,0.2);
  color: var(--red); padding: 10px 14px; border-radius: 8px;
  font-size: 13px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}

.btn-login {
  width: 100%; background: var(--accent); color: white;
  border: none; padding: 13px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: 0.18s;
  margin-top: 8px;
}
.btn-login:hover { background: var(--accent2); }
.btn-login:active { transform: scale(0.99); }

.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

.default-creds {
  background: rgba(232,114,28,0.06); border: 1px solid rgba(232,114,28,0.15);
  border-radius: 8px; padding: 12px 14px;
}
.default-creds p { font-size: 12px; color: var(--text2); line-height: 1.8; font-family: 'Space Mono', monospace; }
.default-creds strong { color: var(--accent); }

.footer {
  text-align: center; margin-top: 24px;
  font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace;
}
.btn-theme-login {
  position: fixed; top: 16px; right: 16px;
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: 0.18s; z-index: 10;
}
.btn-theme-login:hover { border-color: var(--accent); }
</style>
</head>
<body>
<button class="btn-theme-login" id="loginThemeBtn" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">◈</div>
    <div class="brand-name">Lumina<span>Show</span></div>
    <div class="brand-tagline">Digital Signage Platform</div>
  </div>

  <div class="card">
    <div class="card-title">Sign In</div>

    {% if error %}
    <div class="error-msg">✕ {{ error }}</div>
    {% endif %}

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In →</button>
    </form>

    <hr class="divider">
    <div class="default-creds">
      <p>Default credentials:<br>
      Username: <strong>admin</strong><br>
      Password: <strong>admin123</strong></p>
    </div>
  </div>

  <div class="footer">LuminaShow v1.2 · Ubuntu Digital Signage</div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('lumina-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('loginThemeBtn');
  if (btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
})();
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('lumina-theme', next);
  document.getElementById('loginThemeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      document.body.insertAdjacentHTML('afterbegin', `<div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a0a0a;border:1px solid rgba(232,64,64,0.3);color:#e84040;padding:12px 20px;border-radius:8px;z-index:9999">${data.error || 'Login failed'}</div>`);
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  } catch {
    btn.textContent = 'Sign In →';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
